<!DOCTYPE html> 
<html>
<head>
    <title>PanthoFlow - login</title>
    
    <link rel="stylesheet" href="/css/sign_up_log_in.css">
   <!--<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap.css" rel="stylesheet">-->
    
</head>
<body>
    <header class="top-nav">
        <div class="nav-links">
            <button class="nav-btn"><a class='link_to_aboutme'href="../html/panthoflow_about.html">About</a></button>
            <button class="nav-btn"><a class='link_to_aboutme'href='../html/credits.html'>Credits</a></button>
        </div> 
        <div class="login-area">
            <input type="text" placeholder="Email or Username" class="nav-input">
            <input type="password" placeholder="Password" class="nav-input">
            
            <div class="halo-container">
        <button class="login-submit">Log in</button>
    </div>


        </div>
    </header>

    <main class="hero-container">
        <div class="signup-card">
            <img class='logo' src="../images/betterPantho.png" alt="Logo">
            <h2>New to PanthoFlow? <a href="../login_signin/signin.html" style="color: #e24acb;">Sign up!</a></h2>
            <p class="subtitle">Get the best experience by telling us what you need:</p>
            
            <div class="option-list">
                <button class="option-btn" data-role="Education">Education (teacher or student)</button>
                <button class="option-btn" data-role="Business">Small business (startup, blog)</button>
                <button class="option-btn" data-role="Personal">Personal (home, family)</button>
            </div>

            <p class="terms">By signing up, you agree to PanthoFlow's<br><a href="#">Terms & Conditions</a></p>
        </div>

        <div class="hero-text">
            <h1>Showcase your work to others <br>and express your creativity.</h1> 
            <blockquote class="quote">
                "Technology alone is not enough, it’s technology married with liberal arts."
                <cite>— Steve Jobs</cite>
            </blockquote>
        </div>
    </main>
    <script src="/js/auth.js"></script>
    <script src="/login_signin/loginRoles.js"></script>
</body>
</html>
