<div class="modal-overlay" id="subcard-modal">
    <div class="modal-box">

        <div class="modal-header">
            <h2>New Song</h2>
            <button class="modal-close" id="modal-close">✕</button>
        </div>

        <label class="modal-label">Title</label>
        <input 
            type="text" 
            class="modal-input" 
            id="card-title" 
            placeholder="e.g. Sunflower"
            maxlength="60"
        >

        <label class="modal-label">Genre</label>
        <select class="modal-input" id="card-category">
            <option value="" disabled selected>Choose a genre...</option>
            <option value="hip-hop">Hip-Hop</option>
            <option value="pop">Pop</option>
            <option value="rock">Rock</option>
            <option value="indie">Indie</option>
            <option value="dance">Dance</option>
            <option value="other">Other</option>
        </select>

        <label class="modal-label">Link</label>
        <textarea 
            class="modal-input modal-textarea" 
            id="card-description" 
            placeholder="Link to song"
            maxlength="200"
        ></textarea>

        <p class="modal-message" id="modal-message"></p>

        <div class="modal-actions">
            <button class="modal-cancel" id="modal-cancel">Cancel</button>
            <button class="modal-submit" id="modal-submit">Add Song</button>
        </div>

    </div>
</div>
