
<!--new_page_music.html-->


<!DOCTYPE html>
<html>
    <head>
        <title></title>

        <script src="https://unpkg.com/lucide@latest"></script>
        <link rel="stylesheet" href="../css/subcard_delete.css">
        <link rel="stylesheet" href="../css/section_pages.css">
        <link rel="stylesheet" href="../css/button.css">
        <link rel="stylesheet" href="../css/add_button.css">
        <link rel="stylesheet" href="../css/follow_button.css">
        <link rel="stylesheet" href="../css/edit_button.css">
        <link rel="stylesheet" href="../css/modal.css">


    </head>

    <body>
             <button class="back-btn" onclick="history.back()">
                <span class="arrow"></span>
                Back
            </button>


<button class="add-btn" title="Create New Project">+</button>
        
        <button class="edit-btn" style="background-color: #ff85a2;">
            <i data-lucide="pencil" class="pencil-icon"></i>
            <span id="edit-wbtn-text">Edit</span>
        </button>

        <button class="follow-btn" id="like-btn" title="Like this card">
            <svg class="star-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="stroke: black;">
                <path d="M2 21h4V9H2v12zm20-11c0-1.1-.9-2-2-2h-6l1-5v-.5c0-.8-.7-1.5-1.5-1.5L13 1 7.6 7.4C7.2 7.8 7 8.3 7 8.8V19c0 1.1.9 2 2 2h7c.8 0 1.5-.5 1.8-1.2l3-7c.1-.2.2-.5.2-.8v-2z"/>
            </svg>
        </button>

<header class="introduction">
        <div class="title">
           <h1 class="user_music_title"></h1>
            <textarea class="edit-input-field" id="header-textarea"  style="display: none;"></textarea>
            <p class="modal-message" id="error-check"></p>
        
        </div>
        
         <div class="mini_description" style="align-items: center;">
            <p id="mini_description_text"></p></p>
            <p class="modal-message" id="error-check"></p>
            <textarea class="edit-input-field" id="text-textarea"  style="display: none;"></textarea>
            
        </div>
</header>

<div class="three_songs_per_row">

</div>



<div class="modal-overlay" id="subcard-modal">
    <div class="modal-box">

        <div class="modal-header">
            <h2>New Song</h2>
            <button class="modal-close" id="modal-close">✕</button>
        </div>

        <label class="modal-label">Title</label>
        <input 
            type="text" 
            class="modal-input" 
            id="card-title" 
            placeholder="e.g. Sunflower"
            maxlength="60"
        >

        <label class="modal-label">Genre</label>
        <select class="modal-input" id="card-category">
            <option value="" disabled selected>Choose a genre...</option>
            <option value="hip-hop">Hip-Hop</option>
            <option value="pop">Pop</option>
            <option value="rock">Rock</option>
            <option value="indie">Indie</option>
            <option value="dance">Dance</option>
            <option value="other">Other</option>
        </select>

        <label class="modal-label">Link</label>
        <textarea 
            class="modal-input modal-textarea" 
            id="card-description" 
            placeholder="Link to song"
            maxlength="200"
            style="height: 40px;"
        ></textarea>
        
<label class="modal-label">Artwork Image <span style="color:#e74c3c">*</span></label>
<div class="image-upload-area" id="image-upload-area">
    <img 
        id="art-preview" 
        src="" 
        alt=""
        style="display:none; width:100%; max-height:180px; object-fit:contain; border-radius:8px; margin-bottom:8px;"
    >
    <button type="button" class="image-upload-btn" id="image-upload-btn">
        📁 Choose Image
    </button>
    <span class="image-upload-hint" id="image-upload-hint">No image selected</span>
    <input type="file" id="art-file-input" accept="image/*" style="display:none;">
</div>

        <p class="modal-message" id="modal-message"></p>

        <div class="modal-actions">
            <button class="modal-cancel" id="modal-cancel">Cancel</button>
            <button class="modal-submit" id="modal-submit">Add Song</button>
        </div>

    </div>
</div>
        




                <footer for="the_links" class="recap">
                    <a class="links"></a> 
                </footer>
    <!--<script src="../js/audioPreview"></script>-->
    <script type='module' src="../js/add_subcard.js"></script>
    <script  type="module" src="../js/modalSubcard.js"></script>
    <script  type="module" src="../js/edit_subcard.js"></script>
    <script  type="module" src="../js/like.js"></script>
    

    </body>
</html>
