<!DOCTYPE html>
<html>
    <head>
        <title></title>

        <script src="https://unpkg.com/lucide@latest"></script>
        <link rel="stylesheet" href="../css/subcard_delete.css">
        <link rel="stylesheet" href="../css/art_card.css">
        <link rel="stylesheet" href="../css/section_pages.css">
        <link rel="stylesheet" href="../css/button.css">
        <link rel="stylesheet" href="../css/follow_button.css">
        <link rel="stylesheet" href="../css/add_button.css">
        <link rel="stylesheet" href="../css/edit_button.css">
        <link rel="stylesheet" href="../css/modal.css">


    </head>

    <body>
             <button class="back-btn" onclick="history.back()">
                <span class="arrow"></span>
                Back
            </button>


<button class="add-btn" title="Create New Project">+</button>
        
        <button class="edit-btn" style="background-color: #ff85a2;">
            <i data-lucide="pencil" class="pencil-icon"></i>
            <span id="edit-wbtn-text">Edit</span>
        </button>

        <button class="follow-btn" id="like-btn" title="Like this card">
            <svg class="star-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
            </svg>
        </button>

<header class="introduction">
        <div class="title">
           <h1 class="user_music_title"></h1>
            <textarea class="edit-input-field" id="header-textarea"  style="display: none;"></textarea>
            <p class="modal-message" id="error-check"></p>
        
        </div>
        
         <div class="mini_description" style="align-items: center;">
            <p id="mini_description_text"></p></p>
            <p class="modal-message" id="error-check"></p>
            <textarea class="edit-input-field" id="text-textarea"  style="display: none;"></textarea>
            
        </div>
</header>

<div class="three_songs_per_row">

</div>



<div class="modal-overlay" id="subcard-modal">
    <div class="modal-box">

        <div class="modal-header">
            <h2>New Art Piece</h2>
            <button class="modal-close" id="modal-close">✕</button>
        </div>

        <label class="modal-label">Title</label>
        <input 
            type="text" 
            class="modal-input" 
            id="card-title" 
            placeholder="e.g. 'The Mona Lisa'"
            maxlength="60"
        >

        <label class="modal-label">Style</label>
        <select class="modal-input" id="card-category">
            <option value="" disabled selected>Choose a style...</option>
            <option value="paint">Paint</option>
            <option value="surrealism">Surrealism</option>
            <option value="vintage">Vintage</option>
            <option value="doodle">Doodle</option>
            <option value="ai">AI-Generated</option>
            <option value="3d">3D</option>
            <option value="game">Game</option>
            <option value="abstract">Abstract</option>
            <option value="realism">Realism</option>
            <option value="comic">Comic</option>
            <option value="other">Other</option>
        </select>

        <label class="modal-label">Link</label>
        <textarea 
            class="modal-input modal-textarea" 
            id="card-description" 
            placeholder="Describe the piece"
            maxlength="200"
           
        ></textarea>
        <textarea 
            class="modal-input modal-textarea" 
            id="card-link-image" 
            placeholder="Showcase Art (required)"
            maxlength="200"
            style="height: 40px;"
        ></textarea>

        <p class="modal-message" id="modal-message"></p>

        <div class="modal-actions">
            <button class="modal-cancel" id="modal-cancel">Cancel</button>
            <button class="modal-submit" id="modal-submit">Add Piece</button>
        </div>

    </div>
</div>
        




                <footer for="the_links" class="recap">
                    <a class="links"></a> 
                </footer>
    <!--<script src="../js/audioPreview"></script>-->

<!-- ART LIGHTBOX — shared by all art pieces, JS populates it -->
<div class="art-lightbox" id="art-lightbox">
    <div class="lightbox-panel" id="lightbox-panel">

        <img class="lightbox-image" id="lightbox-image" src="" alt="">

        <div class="lightbox-description" id="lightbox-description">
            <span class="art-style-tag" id="lightbox-style"></span>
            <h2 id="lightbox-title"></h2>
            <p id="lightbox-desc-text"></p>
        </div>

        <button class="lightbox-close" id="lightbox-close">✕</button>
        <button class="lightbox-flip" id="lightbox-flip">Show Description</button>

    </div>
</div>

    <script type='module' src="../js/add_subcard.js"></script>
    <script  type="module" src="../js/modalSubcard.js"></script>
    <script type="module" src="../js/art_card.js"></script>
    <script  type="module" src="../js/edit_subcard.js"></script>
    <script  type="module" src="../js/like.js"></script>
    
    
    </body>
</html>
