    <!-- CARD CREATION MODAL -->
<div class="modal-overlay" id="card-modal">
    <div class="modal-box">

        <div class="modal-header">
            <h2>New Card</h2>
            <button class="modal-close" id="modal-close">✕</button>
        </div>

        <label class="modal-label">Title</label>
        <input 
            type="text" 
            class="modal-input" 
            id="card-title" 
            placeholder="e.g. My Design Work"
            maxlength="60"
        >

        <label class="modal-label">Category</label>
        <select class="modal-input" id="card-category">
            <option value="" disabled selected>Choose a category...</option>
            <option value="article">Article</option>
            <option value="art">Art</option>
            <option value="music">Music</option>
            <option value="code">Code</option>
            <option value="photography">Photography</option>
            <option value="other">Other</option>
        </select>

        <label class="modal-label">Description</label>
        <textarea 
            class="modal-input modal-textarea" 
            id="card-description" 
            placeholder="What's this card about?"
            maxlength="120"
        ></textarea>

        <p class="modal-message" id="modal-message"></p>

        <div class="modal-actions">
            <button class="modal-cancel" id="modal-cancel">Cancel</button>
            <button class="modal-submit" id="modal-submit">Create Card</button>
        </div>

    </div>
</div>
