<!DOCTYPE html>
<html>
    <head>
        <title></title>

        <script src="https://unpkg.com/lucide@latest"></script>
        <link rel="stylesheet" href="../css/subcard_delete.css">
        <link rel="stylesheet" href="../css/section_pages.css">
        <link rel="stylesheet" href="../css/button.css">
        <link rel="stylesheet" href="../css/overlay.css">
        <link rel="stylesheet" href="../css/add_button.css">
        <link rel="stylesheet" href="../css/follow_button.css">
        <link rel="stylesheet" href="../css/edit_button.css">
        <link rel="stylesheet" href="../css/modal.css">


    </head>

    <body>
             <button class="back-btn" onclick="history.back()">
                <span class="arrow"></span>
                Back
            </button>


<button class="add-btn" title="Create New Project">+</button>
        
        <button class="edit-btn" style="background-color: #ff85a2;">
            <i data-lucide="pencil" class="pencil-icon"></i>
            <span id="edit-wbtn-text">Edit</span>
        </button>

        <button class="follow-btn" id="like-btn" title="Like this card" style="border-color: solid black;">
            <svg class="star-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
            </svg>
        </button>

<header class="introduction">
        <div class="title">
           <h1 class="user_music_title"></h1>
            <textarea class="edit-input-field" id="header-textarea"  style="display: none;"></textarea>
            <p class="modal-message" id="error-check"></p>
        
        </div>
        
         <div class="mini_description" style="align-items: center;">
            <p id="mini_description_text"></p></p>
            <p class="modal-message" id="error-check"></p>
            <textarea class="edit-input-field" id="text-textarea"  style="display: none;"></textarea>
            
        </div>
</header>

<div class="three_songs_per_row">

</div>



<div class="modal-overlay" id="subcard-modal">
    <div class="modal-box">

        <div class="modal-header">
            <h2>New Project</h2>
            <button class="modal-close" id="modal-close">✕</button>
        </div>

        <label class="modal-label">Title</label>
        <input 
            type="text" 
            class="modal-input" 
            id="card-title" 
            placeholder="e.g. Cryptocurrency"
            maxlength="60"
        >

        <label class="modal-label">Language</label>
        <select class="modal-input" id="card-category">
            <option value="" disabled selected>What language?...</option>
            <option value="python">Python</option>
            <option value="c++">C++</option>
            <option value="c">C</option>
            <option value="java">Java</option>
            <option value="full">Full stack</option>
            <option value="rust">Rust</option>
            <option value="javascript">Javascript</option>
            <option value="web">Web devlopment</option>
            <option value="other">Other</option>
        </select>

        <label class="modal-label">Description</label>
        <textarea 
            class="modal-input modal-textarea" 
            id="card-description" 
            placeholder="Describe the project"
            maxlength="200"
            style="height: 40px;"
        ></textarea>
        <textarea 
            class="modal-input modal-textarea" 
            id="card-link-image" 
            placeholder="Cover Art"
            maxlength="200"
            style="height: 40px;"
        ></textarea>

        <p class="modal-message" id="modal-message"></p>

        <div class="modal-actions">
            <button class="modal-cancel" id="modal-cancel">Cancel</button>
            <button class="modal-submit" id="modal-submit">Add Project</button>
        </div>

    </div>
</div>
        




                <footer for="the_links" class="recap">
                    <a class="links"></a> 
                </footer>
    <!--<script src="../js/audioPreview"></script>-->
    <script type='module' src="../js/add_subcard.js"></script>
    <script  type="module" src="../js/modalSubcard.js"></script>
    <script  type="module" src="../js/edit_subcard.js"></script>
    <script  type="module" src="../js/like.js"></script>
    
    

    </body>
</html>
