<div class="modal-overlay" id="subcard-modal">
    <div class="modal-box">

        <div class="modal-header">
            <h2>New Article</h2>
            <button class="modal-close" id="modal-close">✕</button>
        </div>

        <label class="modal-label">Title</label>
        <input 
            type="text" 
            class="modal-input" 
            id="card-title" 
            placeholder="e.g. Harry Potter"
            maxlength="120"
        >

        <label class="modal-label">Genre</label>
        <select class="modal-input" id="card-category">
            <option value="" disabled selected>Choose a category...</option>
            <option value="sci-fi">Sci-fi</option>
            <option value="non-fiction">Non-fiction</option>
            <option value="action">Action</option>
            <option value="poem">Poem</option>
            <option value="poet">Poet</option>
            <option value="biography">Biography</option>
            <option value="fiction">Fiction</option>
            <option value="comic">Comic</option>
            <option value="manga">Manga</option>
        </select>

        <label class="modal-label">Link</label>
        <textarea 
            class="modal-input modal-textarea" 
            id="card-description" 
            placeholder="Link to Article"
            maxlength="200"
            style="height: 40px;"
        ></textarea>
        
<label class="modal-label">Artwork Image <span style="color:#e74c3c">*</span></label>
<div class="image-upload-area" id="image-upload-area">
    <img 
        id="art-preview" 
        src="" 
        alt=""
        style="display:none; width:100%; max-height:180px; object-fit:contain; border-radius:8px; margin-bottom:8px;"
    >
    <button type="button" class="image-upload-btn" id="image-upload-btn">
        📁 Choose Image
    </button>
    <span class="image-upload-hint" id="image-upload-hint">No image selected</span>
    <input type="file" id="art-file-input" accept="image/*" style="display:none;">
</div>

        <p class="modal-message" id="modal-message"></p>

        <div class="modal-actions">
            <button class="modal-cancel" id="modal-cancel">Cancel</button>
            <button class="modal-submit" id="modal-submit">Add Article</button>
        </div>

    </div>
</div>
        

                <footer for="the_links" class="recap">
